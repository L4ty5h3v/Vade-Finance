version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vade
      POSTGRES_PASSWORD: vade
      POSTGRES_DB: vade_finance
    ports:
      - "5432:5432"
    volumes:
      - vade_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  vade_pg_data:
